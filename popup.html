<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AutoFair</title>
    <link rel="stylesheet" href="styles/popup.css">
  </head>
  <body>
    <div class="popup-shell">
      <header class="hero-card">
        <div class="hero-brand">
          <img src="assets/logo.svg" alt="AutoFair logo" class="hero-logo">
          <div>
            <div class="eyebrow">FlegarTech</div>
            <h1>AutoFair</h1>
            <p id="hero-subtitle">Know if the price is fair before you buy.</p>
          </div>
        </div>
        <div class="hero-pill" id="hero-pill">Panel-First</div>
      </header>

      <div class="dashboard-grid">
        <section class="panel" id="current-panel">
          <div class="section-head">
            <div>
              <div class="eyebrow" id="current-page-eyebrow">Current Page</div>
              <h2 id="listing-summary-title">Listing summary</h2>
            </div>
            <button class="icon-btn" id="refresh-current-btn" type="button">Refresh</button>
          </div>
          <div id="current-content" class="panel-body"></div>
        </section>

        <section class="panel">
          <div class="section-head">
            <div>
              <div class="eyebrow" id="watchlist-eyebrow">Watchlist</div>
              <h2 id="saved-cars-title">Saved cars</h2>
            </div>
            <button class="icon-btn" id="refresh-watchlist-btn" type="button">Refresh all</button>
          </div>
          <div id="watchlist-content" class="watchlist-list"></div>
        </section>
      </div>

      <section class="panel panel--settings">
        <div class="section-head">
          <div>
              <div class="eyebrow" id="settings-eyebrow">Settings</div>
              <h2 id="extension-controls-title">Extension controls</h2>
            </div>
          </div>
        <div class="settings-grid">
          <label class="setting-row">
            <span id="label-show-panel">Show floating panel</span>
            <input type="checkbox" id="setting-show-panel">
          </label>
          <label class="setting-row">
            <span id="label-auto-run">Auto-run analysis on page load</span>
            <input type="checkbox" id="setting-auto-run">
          </label>
          <label class="setting-row">
            <span id="label-notifications">Price-drop notifications</span>
            <input type="checkbox" id="setting-notifications">
          </label>
          <label class="setting-row">
            <span id="label-default-collapsed">Default collapsed panel</span>
            <input type="checkbox" id="setting-default-collapsed">
          </label>
          <label class="setting-row">
            <span id="label-compact-panel">Compact panel mode</span>
            <input type="checkbox" id="setting-compact-panel">
          </label>
          <label class="setting-row">
            <span id="label-remember-position">Remember panel position</span>
            <input type="checkbox" id="setting-remember-position">
          </label>
          <label class="setting-row">
            <span id="label-auto-refresh">Refresh saved items on popup open</span>
            <input type="checkbox" id="setting-auto-refresh">
          </label>
          <label class="setting-row">
            <span id="label-density">Watchlist density</span>
            <select id="setting-density">
              <option value="detailed" id="density-detailed">Detailed</option>
              <option value="compact" id="density-compact">Compact</option>
            </select>
          </label>
        </div>
      </section>

      <footer class="footer-card">
        <div>
          <strong id="built-by">Built by FlegarTech</strong>
          <p id="support-text">If AutoFair saved you money, consider supporting development.</p>
        </div>
        <button class="support-btn" id="support-btn" type="button">Support AutoFair</button>
      </footer>
      <div id="status-bar" class="status-bar" aria-live="polite"></div>
    </div>

    <script src="lib/constants.js"></script>
    <script src="lib/i18n.js"></script>
    <script src="lib/utils.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
